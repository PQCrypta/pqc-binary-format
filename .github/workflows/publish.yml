name: Publish

# This workflow is triggered when you create a new release on GitHub
# or manually run the workflow from the Actions tab

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          cargo test --all --verbose
          cargo test --doc --verbose

      - name: Run examples
        run: |
          cargo run --example basic_usage
          cargo run --example with_compression
          cargo run --example algorithm_comparison

      - name: Verify package
        run: cargo package --allow-dirty --verbose

      - name: Get OIDC token from crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io (with Trusted Publisher)
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        continue-on-error: false

      - name: Verify publication
        run: |
          sleep 30
          PACKAGE_NAME=$(grep '^name' Cargo.toml | head -1 | cut -d'"' -f2)
          PACKAGE_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "Checking if $PACKAGE_NAME v$PACKAGE_VERSION is available..."
          cargo search $PACKAGE_NAME | grep -q $PACKAGE_VERSION && echo "✅ Package published successfully!" || echo "⚠️ Package not yet indexed (may take a few minutes)"
